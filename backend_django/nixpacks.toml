# ── Configuration Nixpacks pour Railway ──────────────────────────────────────
# Railway détecte automatiquement Python/Django via requirements.txt.
# Ce fichier ajoute les dépendances système non-Python.

[phases.setup]
# Polices via Nix (pas apt) — apt-get peut échouer selon la région Railway.
# dejavu_fonts : DejaVuSans.ttf → rendu Unicode Latin dans ReportLab
# noto-fonts   : polices Noto   → rendu arabe RTL dans les PDF officiels
# fontconfig   : enregistrement des polices (fc-cache) pour ReportLab
nixPkgs = ["dejavu_fonts", "noto-fonts", "fontconfig"]

# Note : la commande de démarrage est définie dans railway.json (startCommand)
# et non ici pour éviter les conflits. Ne pas ajouter de section [start] ici.
